name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install
        run: |
          uv venv
          uv pip install -e '.[all]' ruff
      - name: Lint
        run: .venv/bin/ruff check src/ tests/
      - name: Test
        run: .venv/bin/pytest tests/ -v
      - name: Alembic offline check (upgrade DDL renders)
        run: .venv/bin/alembic upgrade head --sql > /tmp/upgrade.sql && head -10 /tmp/upgrade.sql
