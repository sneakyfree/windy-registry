name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest + ruff
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: runner-lint (hosted runners are billing-locked)
        run: bash "$GITHUB_WORKSPACE/.github/lint/lint-runner-labels.sh" "$GITHUB_WORKSPACE/.github/workflows"
      - uses: astral-sh/setup-uv@v3
      - name: Install
        run: |
          uv venv
          uv pip install -e '.[all]' ruff
      - name: Lint
        run: .venv/bin/ruff check src/ tests/
      - name: Test
        run: .venv/bin/pytest tests/ -v
      - name: Alembic offline check (upgrade DDL renders)
        run: .venv/bin/alembic upgrade head --sql > /tmp/upgrade.sql && head -10 /tmp/upgrade.sql

  postgres-integration:
    # Real-Postgres suite. Exists because three prod-only bugs (fork FK,
    # jsonb LIKE, EPT claim shape) shipped while the SQLite suite was green.
    name: postgres integration
    runs-on: [self-hosted, linux, x64]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: test
        # Container port only — Docker picks a free ephemeral host port.
        # The shared self-hosted runner host already has 5432 bound, and a
        # fixed mapping would also collide with concurrent jobs.
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install
        run: |
          uv venv
          uv pip install -e '.[all]'
      - name: Run integration suite against real Postgres
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:test@127.0.0.1:${{ job.services.postgres.ports['5432'] }}/postgres
        run: .venv/bin/pytest tests/test_postgres_integration.py -v
