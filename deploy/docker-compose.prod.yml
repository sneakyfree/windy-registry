name: windy-registry-prod

# Production overlay for the SHARED EC2 host (54.88.113.79).
#
# The host already runs a Caddy container (deploy-caddy-1) on the
# deploy_backend network that handles TLS + reverse-proxy for every Windy
# service. This overlay attaches our api container to that network so
# Caddy can resolve `windy-registry-api` and proxy to port 8500.
#
# Combine with the base compose:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.prod.yml \
#     --env-file deploy/.env.production up -d --force-recreate
#
# Per feedback_compose_restart_envfile: env changes require --force-recreate,
# NOT restart.
# Per feedback_compose_project_name_collision: `-p windy-registry-prod`
# must match the `name:` directive above.

services:
  api:
    container_name: windy-registry-api  # stable DNS name for Caddy
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_BUCKET: ${R2_BUCKET:-windydrops-bundles}
      R2_PUBLIC_DOMAIN: ${R2_PUBLIC_DOMAIN:-drops.windydrops.com}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      PRO_JWKS_URL: ${PRO_JWKS_URL:-https://account.windyword.ai/.well-known/jwks.json}
      ETERNITAS_JWKS_URL: ${ETERNITAS_JWKS_URL:-https://api.eternitas.ai/.well-known/eternitas-keys}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports: !reset []                    # base compose binds 8500 publicly; reset so only the shared Caddy reaches us
    networks:
      - default                          # postgres + redis sit here
      - deploy_backend                   # so deploy-caddy-1 can resolve us

  postgres:
    container_name: windy-registry-postgres

  redis:
    container_name: windy-registry-redis

networks:
  deploy_backend:
    external: true
